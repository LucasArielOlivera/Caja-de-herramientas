<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caja de herramientas</title>
<meta name="description" content="Colección de herramientas web para tareas administrativas: cálculo de horas, comparación de presupuestos y de listas de nombres.">
<link rel="icon" href="favicon.ico" sizes="48x48">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f7f6f2;
    --card:#ffffff;
    --tab:#eceade;
    --ink:#1d2433;
    --ink-soft:#5b6478;
    --line:#e3e1d9;
    --line-strong:#cfccc2;
    --accent:#283655;
    --accent-soft:#3d4f78;
    --mono:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:ui-sans-serif,system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --display:"Archivo",var(--sans);
  }

  @media (prefers-color-scheme: dark){
    :root{
      --paper:#181b22;
      --card:#20242e;
      --tab:#2a2f3c;
      --ink:#e7e9ee;
      --ink-soft:#9aa2b5;
      --line:#31374533;
      --line-strong:#3d4557;
      --accent:#9db2e0;
      --accent-soft:#7f96c9;
    }
  }

  *{box-sizing:border-box;margin:0;padding:0}

  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  .wrap{max-width:760px;margin:0 auto;padding:48px 20px 72px}

  /* ── encabezado ─────────────────────────────── */
  .eyebrow{
    font-family:var(--mono);font-size:11px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--ink-soft);margin-bottom:10px;
  }
  h1{
    font-family:var(--display);font-weight:700;font-size:clamp(28px,5vw,38px);
    line-height:1.1;letter-spacing:-.015em;margin-bottom:10px;
  }
  .sub{color:var(--ink-soft);font-size:15px;max-width:56ch}

  /* ── registro de herramientas ───────────────── */
  .registro{margin-top:40px;display:flex;flex-direction:column;gap:22px}

  .ficha{
    display:block;text-decoration:none;color:inherit;position:relative;
  }

  /* pestaña de carpeta */
  .ficha .tab{
    display:inline-flex;align-items:center;gap:8px;
    font-family:var(--mono);font-size:11px;letter-spacing:.08em;
    background:var(--tab);border:1px solid var(--line);border-bottom:none;
    color:var(--ink-soft);
    border-radius:8px 8px 0 0;padding:5px 14px 4px;
    margin-left:14px;position:relative;top:1px;
  }
  .ficha .tab .cod{color:var(--accent);font-weight:500}

  .ficha .cuerpo{
    background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:18px 20px;
    transition:transform .15s ease,border-color .15s ease,box-shadow .15s ease;
  }
  .ficha:hover .cuerpo,
  .ficha:focus-visible .cuerpo{
    transform:translateY(-2px);
    border-color:var(--line-strong);
    box-shadow:0 4px 14px rgba(29,36,51,.07);
  }
  .ficha:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:10px}

  .ficha h2{
    font-family:var(--display);font-weight:600;font-size:18px;
    letter-spacing:-.01em;margin-bottom:5px;
    display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;
  }
  .ficha h2 .flecha{
    font-family:var(--mono);font-size:13px;color:var(--accent);
    transition:transform .15s ease;display:inline-block;
  }
  .ficha:hover .flecha{transform:translateX(3px)}

  .ficha p{color:var(--ink-soft);font-size:13.5px;max-width:62ch}

  .etiquetas{margin-top:12px;display:flex;gap:6px;flex-wrap:wrap}
  .etq{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;
    border:1px solid var(--line);border-radius:99px;
    padding:2px 10px;color:var(--ink-soft);
  }

  /* ── pie ────────────────────────────────────── */
  footer{
    margin-top:52px;padding-top:18px;border-top:1px solid var(--line);
    font-family:var(--mono);font-size:11.5px;color:var(--ink-soft);
    display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;
  }

  .vacio{
    text-align:center;padding:40px;color:var(--ink-soft);
    border:1.5px dashed var(--line-strong);border-radius:10px;font-size:13px;
  }

  @media (prefers-reduced-motion: reduce){
    .ficha .cuerpo,.ficha h2 .flecha{transition:none}
    .ficha:hover .cuerpo{transform:none}
    .ficha:hover .flecha{transform:none}
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="eyebrow">Herramientas internas</div>
    <h1>Caja de herramientas</h1>
    <p class="sub">Utilidades web para tareas administrativas del día a día.
    Cada herramienta funciona directamente en el navegador, sin instalar nada
    y sin enviar datos a ningún servidor.</p>
  </header>

  <main class="registro" id="registro" aria-label="Listado de herramientas"></main>

  <footer>
    <span id="conteo"></span>
    <span>Los datos se procesan localmente en tu navegador.</span>
  </footer>
</div>

<script>
/* ══════════════════════════════════════════════════════════════
   PARA AGREGAR UNA HERRAMIENTA NUEVA:
   1. Guardá el archivo .html dentro de la carpeta  herramientas/
   2. Agregá una entrada a este listado, siguiendo el mismo formato.
   El código (cod) es correlativo: HT-001, HT-002, ...
   ══════════════════════════════════════════════════════════════ */
const HERRAMIENTAS = [
  {
    cod: "HT-001",
    nombre: "Calculadora de horas",
    archivo: "herramientas/calculadora_horas.html",
    descripcion: "Calcula diferencias horarias a partir de un reporte de asistencia. Permite cargar el reporte en PDF o ingresar los registros a mano, y resume las horas a favor y en contra.",
    etiquetas: ["asistencia", "PDF", "horarios"]
  },
  {
    cod: "HT-002",
    nombre: "Comparativo de presupuestos",
    archivo: "herramientas/comparador_presupuestos.html",
    descripcion: "Arma un cuadro comparativo entre presupuestos de distintos proveedores, ítem por ítem, para ver de un vistazo cuál conviene.",
    etiquetas: ["presupuestos", "compras"]
  },
  {
    cod: "HT-003",
    nombre: "Comparador de nombres",
    archivo: "herramientas/comparador_nombres.html",
    descripcion: "Cruza dos listas de nombres y detecta coincidencias exactas, nombres reordenados (apellido/nombre), coincidencias parciales y registros sin correspondencia.",
    etiquetas: ["listas", "texto", "cruces"]
  },
  {
    cod: "HT-004",
    nombre: "Calculadora de actualización por tasas",
    archivo: "herramientas/calculadora_tasas.html",
    descripcion: "Actualiza montos aplicando series de tasas (IPC, ICL, tasa pasiva, etc.). Las series viven en el repositorio y se actualizan importando un Excel con columnas Periodo y Porcentaje.",
    etiquetas: ["tasas", "intereses", "Excel"]
  }
];

const cont = document.getElementById("registro");

if (!HERRAMIENTAS.length) {
  cont.innerHTML = '<div class="vacio">Todavía no hay herramientas cargadas.</div>';
} else {
  cont.innerHTML = HERRAMIENTAS.map(h => `
    <a class="ficha" href="${h.archivo}">
      <span class="tab"><span class="cod">${h.cod}</span></span>
      <div class="cuerpo">
        <h2>${h.nombre} <span class="flecha">→</span></h2>
        <p>${h.descripcion}</p>
        <div class="etiquetas">
          ${h.etiquetas.map(e => `<span class="etq">${e}</span>`).join("")}
        </div>
      </div>
    </a>`).join("");
}

document.getElementById("conteo").textContent =
  `${HERRAMIENTAS.length} herramienta${HERRAMIENTAS.length !== 1 ? "s" : ""} · en crecimiento`;
</script>
</body>
</html>
