<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparador de Nombres</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #efefed;
    --text: #1a1a1a;
    --text2: #6b6b67;
    --text3: #a0a09b;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius: 8px;
    --radius-lg: 12px;
    --mono: 'Courier New', Courier, monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2b;
      --text: #e8e8e2;
      --text2: #9a9a94;
      --text3: #5a5a56;
      --border: rgba(255,255,255,0.12);
      --border2: rgba(255,255,255,0.22);
    }
    .b-match   { background: #27500A !important; color: #C0DD97 !important; }
    .b-swap    { background: #633806 !important; color: #FAC775 !important; }
    .b-partial { background: #711310 !important; color: #F5C4B3 !important; }
    .b-none    { background: #791F1F !important; color: #F7C1C1 !important; }
    .tok-diff  { background: #993C1D !important; color: #F5C4B3 !important; }
    .tok-new   { background: #3B6D11 !important; color: #C0DD97 !important; }
    .row-swap td    { background: rgba(99,56,6,0.08) !important; }
    .row-partial td { background: rgba(113,19,16,0.08) !important; }
    .row-none td    { background: rgba(121,31,31,0.08) !important; }
  }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 2rem;
    min-height: 100vh;
  }

  h1 {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 1.5rem;
    color: var(--text);
  }

  .cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .col-label {
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 6px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    font-weight: 500;
  }

  textarea {
    width: 100%;
    height: 180px;
    font-family: var(--mono);
    font-size: 13px;
    resize: vertical;
    padding: 10px 12px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  textarea:focus { outline: none; border-color: var(--text3); }

  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .btn {
    padding: 7px 18px;
    font-size: 13px;
    font-family: var(--mono);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: background 0.12s;
  }

  .btn:hover { background: var(--bg2); }
  .btn:active { transform: scale(0.98); }

  .stats { display: flex; gap: 6px; flex-wrap: wrap; }

  .badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 99px;
    font-family: var(--mono);
  }

  .b-match   { background: #EAF3DE; color: #3B6D11; }
  .b-swap    { background: #FAEEDA; color: #854F0B; }
  .b-partial { background: #FAECE7; color: #993C1D; }
  .b-none    { background: #FCEBEB; color: #A32D2D; }

  .legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 0.75rem;
    font-size: 12px;
    color: var(--text2);
    align-items: center;
  }

  .legend-item { display: flex; align-items: center; gap: 5px; }

  .dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-match   { background: #639922; }
  .dot-swap    { background: #BA7517; }
  .dot-partial { background: #D85A30; }
  .dot-none    { background: #E24B4A; }

  .filter-btns {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 0.75rem;
    align-items: center;
  }

  .flt {
    padding: 4px 12px;
    font-size: 11px;
    border-radius: 99px;
    border: 0.5px solid var(--border);
    cursor: pointer;
    background: transparent;
    color: var(--text2);
    font-family: var(--mono);
    transition: background 0.1s;
  }

  .flt:hover { background: var(--bg2); }

  .flt.active {
    border-color: var(--border2);
    color: var(--text);
    background: var(--bg3);
  }

  .count-note {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
    margin-left: auto;
  }

  .table-wrap {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 500px;
  }

  thead th {
    font-size: 11px;
    color: var(--text2);
    text-align: left;
    padding: 8px 14px;
    background: var(--bg2);
    border-bottom: 0.5px solid var(--border);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 500;
  }

  tbody tr { border-bottom: 0.5px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }

  tbody td {
    padding: 8px 14px;
    vertical-align: middle;
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--text);
  }

  .row-swap td    { background: rgba(250,238,218,0.25); }
  .row-partial td { background: rgba(250,236,231,0.25); }
  .row-none td    { background: rgba(252,235,235,0.25); }

  .row-idx { color: var(--text3); font-size: 11px; width: 36px; }

  .tok-ok   { color: var(--text); }
  .tok-diff { background: #F0997B; color: #4A1B0C; border-radius: 3px; padding: 0 3px; }
  .tok-new  { background: #97C459; color: #173404; border-radius: 3px; padding: 0 3px; }

  .empty {
    text-align: center;
    padding: 3rem;
    color: var(--text3);
    font-size: 13px;
  }
</style>
</head>
<body>

<h1>Comparador de nombres</h1>

<div class="cols">
  <div>
    <div class="col-label">Columna A</div>
    <textarea id="colA" placeholder="Un nombre por línea&#10;Ej: García Juan&#10;López María"></textarea>
  </div>
  <div>
    <div class="col-label">Columna B</div>
    <textarea id="colB" placeholder="Un nombre por línea&#10;Ej: Juan García&#10;Martínez Pedro"></textarea>
  </div>
</div>

<div class="controls">
  <button class="btn" onclick="comparar()">Comparar</button>
  <button class="btn" onclick="limpiar()">Limpiar</button>
  <div class="stats" id="stats"></div>
</div>

<div class="legend">
  <div class="legend-item"><span class="dot dot-match"></span>Coincidencia exacta</div>
  <div class="legend-item"><span class="dot dot-swap"></span>Mismo nombre, orden diferente</div>
  <div class="legend-item"><span class="dot dot-partial"></span>Coincidencia parcial</div>
  <div class="legend-item"><span class="dot dot-none"></span>Sin coincidencia</div>
</div>

<div class="filter-btns" id="filters" style="display:none">
  <button class="flt active" onclick="filtrar('all',this)">Todos</button>
  <button class="flt" onclick="filtrar('match',this)">Exactas</button>
  <button class="flt" onclick="filtrar('swap',this)">Reordenadas</button>
  <button class="flt" onclick="filtrar('partial',this)">Parciales</button>
  <button class="flt" onclick="filtrar('none',this)">Sin match</button>
  <span class="count-note" id="count-note"></span>
</div>

<div id="resultado"><div class="empty">Pegá los nombres en las columnas y hacé clic en Comparar.</div></div>

<script>
let allRows = [];

function norm(s) {
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
}

function tokenize(s) {
  return norm(s).replace(/\(.*?\)/g, '').split(/\s+/).filter(Boolean);
}

function similarity(a, b) {
  const sa = new Set(a), sb = new Set(b);
  const common = [...sa].filter(t => sb.has(t));
  return common.length / Math.max(sa.size, sb.size);
}

function bestMatch(tokA, listB, used) {
  let best = -1, idx = -1;
  listB.forEach((tokB, i) => {
    if (used.has(i)) return;
    const s = similarity(tokA, tokB);
    if (s > best) { best = s; idx = i; }
  });
  return { idx, sim: best };
}

function renderToks(toks, refSet, diffClass) {
  return toks.map(t =>
    `<span class="${refSet.has(t) ? 'tok-ok' : diffClass}">${t}</span>`
  ).join(' ');
}

function comparar() {
  const rawA = document.getElementById('colA').value.split('\n').map(s => s.trim()).filter(Boolean);
  const rawB = document.getElementById('colB').value.split('\n').map(s => s.trim()).filter(Boolean);
  if (!rawA.length && !rawB.length) return;

  const tokA = rawA.map(tokenize), tokB = rawB.map(tokenize);
  const used = new Set();
  allRows = [];

  rawA.forEach((nameA, i) => {
    const { idx, sim } = bestMatch(tokA[i], tokB, used);
    let tipo, nameB = null, tb = [];
    if (idx === -1 || sim === 0) {
      tipo = 'none';
    } else {
      nameB = rawB[idx]; tb = tokB[idx]; used.add(idx);
      if (sim === 1) {
        tipo = tokA[i].join('|') === tb.join('|') ? 'match' : 'swap';
      } else if (sim >= 0.45) {
        tipo = 'partial';
      } else {
        tipo = 'none'; used.delete(idx); nameB = null;
      }
    }
    allRows.push({ nameA, nameB, tokA: tokA[i], tokB: tb, tipo });
  });

  rawB.forEach((nameB, i) => {
    if (!used.has(i))
      allRows.push({ nameA: null, nameB, tokA: [], tokB: tokB[i], tipo: 'none' });
  });

  const c = { match: 0, swap: 0, partial: 0, none: 0 };
  allRows.forEach(r => c[r.tipo]++);

  document.getElementById('stats').innerHTML = `
    <span class="badge b-match">${c.match} exactas</span>
    <span class="badge b-swap">${c.swap} reordenadas</span>
    <span class="badge b-partial">${c.partial} parciales</span>
    <span class="badge b-none">${c.none} sin match</span>`;

  document.getElementById('filters').style.display = 'flex';
  document.querySelectorAll('.flt').forEach(b => b.classList.remove('active'));
  document.querySelector('.flt').classList.add('active');
  renderTable('all');
}

function filtrar(tipo, btn) {
  document.querySelectorAll('.flt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable(tipo);
}

function renderTable(filtro) {
  const rows = filtro === 'all' ? allRows : allRows.filter(r => r.tipo === filtro);
  document.getElementById('count-note').textContent = `${rows.length} registros`;

  if (!rows.length) {
    document.getElementById('resultado').innerHTML =
      '<div class="empty">Sin resultados para este filtro.</div>';
    return;
  }

  const filas = rows.map((r, i) => {
    const sbA = new Set(r.tokA), sbB = new Set(r.tokB);
    const celA = r.nameA
      ? renderToks(r.tokA, sbB, 'tok-diff')
      : '<span style="color:var(--text3)">—</span>';
    const celB = r.nameB
      ? renderToks(r.tokB, sbA, 'tok-new')
      : '<span style="color:var(--text3)">—</span>';
    return `<tr class="row-${r.tipo}">
      <td class="row-idx">${i + 1}</td>
      <td><span class="dot dot-${r.tipo}" style="margin-right:6px"></span>${celA}</td>
      <td>${celB}</td>
    </tr>`;
  }).join('');

  document.getElementById('resultado').innerHTML = `
    <div class="table-wrap"><table>
      <thead><tr><th>#</th><th>Columna A</th><th>Columna B</th></tr></thead>
      <tbody>${filas}</tbody>
    </table></div>`;
}

function limpiar() {
  document.getElementById('colA').value = '';
  document.getElementById('colB').value = '';
  document.getElementById('stats').innerHTML = '';
  document.getElementById('filters').style.display = 'none';
  document.getElementById('resultado').innerHTML =
    '<div class="empty">Pegá los nombres en las columnas y hacé clic en Comparar.</div>';
  allRows = [];
}
</script>
</body>
</html>
